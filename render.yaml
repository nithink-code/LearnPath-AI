services:
  # Backend: Node.js Express Server
  - type: web
    name: learnpath-backend
    env: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 3000
      - key: MONGOURL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # Frontend: React Vite Static Site
  - type: static_site
    name: learnpath-frontend
    plan: free
    region: ohio
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      # Use the public URL of your backend service here.
      # Since the URL is generated by Render, you may need to:
      # 1. Deploy the backend first to get its URL.
      # 2. Add VITE_API_BASE_URL to the frontend environment variables in Render Dashboard.
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
